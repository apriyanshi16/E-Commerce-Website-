kind = "web"
previewPath = "/"
title = "FashinHub"
version = "1.0.0"
id = "artifacts/fashinhub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24035

[services.development]
run = "pnpm --filter @workspace/fashinhub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fashinhub", "run", "build" ]
publicDir = "artifacts/fashinhub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24035"
BASE_PATH = "/"
